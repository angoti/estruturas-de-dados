<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BST — Os Três Casos de Remoção</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;color:#E6EDF3;font-family:'Sora',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 40px}
.wrap{width:100%;max-width:820px}
header{margin-bottom:18px}
.badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;background:#0a2e22;color:#1D9E75;border:1px solid #0F6E56;border-radius:4px;padding:3px 8px;margin-bottom:8px}
h1{font-size:20px;font-weight:600;margin-bottom:3px}
.sub{font-size:12px;color:#8B949E;font-family:'IBM Plex Mono',monospace}
.card{background:#161B22;border:1px solid #30363D;border-radius:12px;padding:18px 20px}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;border:1px solid #30363D;background:#0D1117;color:#E6EDF3;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;transition:background .15s,border-color .15s}
.tab:hover{background:#21262D;border-color:#8B949E}
.tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75}

/* árvore */
#svg-bst{display:block;width:100%;margin-bottom:10px}

/* controles */
.ctrl{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ctrl .tab{font-size:12px}
#counter{font-size:11px;color:#8B949E;margin-left:4px}

/* painéis inferiores */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.panel{background:#0D1117;border:1px solid #30363D;border-radius:8px;padding:10px 14px}
.lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:#8B949E;text-transform:uppercase;margin-bottom:5px}
.val{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#E6EDF3;min-height:16px}
.val.green{color:#1D9E75}
.explain-text{font-size:13px;color:#E6EDF3;line-height:1.65;min-height:40px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">IFTM · Estrutura de Dados · 2026/1</div>
    <h1>BST — Os Três Casos de Remoção</h1>
    <p class="sub">Visualização interativa · Semana 8</p>
  </header>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="setCase(0,this)">Caso 1 — Folha</button>
      <button class="tab" onclick="setCase(1,this)">Caso 2 — Um filho</button>
      <button class="tab" onclick="setCase(2,this)">Caso 3 — Dois filhos</button>
    </div>

    <svg id="svg-bst" viewBox="0 0 680 175">
      <defs>
        <marker id="arm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <g id="g-edges"></g>
      <g id="g-nodes"></g>
    </svg>

    <div class="ctrl">
      <button class="tab" onclick="prev()">← Anterior</button>
      <button class="tab" onclick="next()">Próximo →</button>
      <button class="tab" onclick="reset()" style="color:#8B949E">↺ Reiniciar</button>
      <span id="counter">Passo 0 de 0</span>
    </div>

    <div class="info-grid">
      <div class="panel">
        <div class="lbl">Ação</div>
        <div class="val" id="acao">—</div>
      </div>
      <div class="panel">
        <div class="lbl">In-order após remoção</div>
        <div class="val green" id="inorder">—</div>
      </div>
    </div>

    <div class="panel">
      <div class="lbl">Explicação</div>
      <div class="explain-text" id="explain">Clique em Próximo para iniciar.</div>
    </div>
  </div>
</div>

<script>
const NS='http://www.w3.org/2000/svg';
const C={
  normal:{f:'#0a2e22',s:'#1D9E75',t:'#5DCAA5'},
  cur:   {f:'#2e1f08',s:'#BA7517',t:'#EF9F27'},
  vis:   {f:'#1e1a3a',s:'#534AB7',t:'#AFA9EC'},
  del:   {f:'#2e0a0a',s:'#A32D2D',t:'#F09595'},
  succ:  {f:'#1a2e0a',s:'#3B6D11',t:'#97C459'},
};
const EC='#4a5568', ED='#A32D2D', EN='#1D9E75';

const Y0=26,Y1=90,Y2=152,R0=20,R1=19,R2=17;
const POS={
  n10:{cx:340,cy:Y0,r:R0}, n5:{cx:190,cy:Y1,r:R1}, n15:{cx:490,cy:Y1,r:R1},
  n3:{cx:110,cy:Y2,r:R2},  n7:{cx:270,cy:Y2,r:R2},
  n12:{cx:410,cy:Y2,r:R2}, n20:{cx:570,cy:Y2,r:R2},
};

function svgEl(tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  return e;
}
function edgeXY(g,p1,p2,color=EC,dashed=false){
  const dx=p2.cx-p1.cx,dy=p2.cy-p1.cy,d=Math.sqrt(dx*dx+dy*dy);
  if(d===0)return;
  const sx=dx/d,sy=dy/d;
  const l=svgEl('line',{
    x1:p1.cx+sx*p1.r,y1:p1.cy+sy*p1.r,
    x2:p2.cx-sx*p2.r,y2:p2.cy-sy*p2.r,
    stroke:color,'stroke-width':'1.8'
  });
  if(dashed)l.setAttribute('stroke-dasharray','5 3');
  g.appendChild(l);
}
function edge(g,a,b,color=EC,dashed=false){
  edgeXY(g,POS[a],POS[b],color,dashed);
}
function nodeAt(g,cx,cy,r,val,color){
  const c=svgEl('circle',{cx,cy,r,fill:color.f,stroke:color.s,'stroke-width':'2'});
  const t=svgEl('text',{x:cx,y:cy,'text-anchor':'middle','dominant-baseline':'central',
    'font-size':r>=18?'13':'12','font-weight':'500',fill:color.t,
    'font-family':"'IBM Plex Mono',monospace"});
  t.textContent=val;
  g.appendChild(c);g.appendChild(t);
}
function node(g,id,val,color){
  const p=POS[id];
  nodeAt(g,p.cx,p.cy,p.r,val,color);
}

const CASES=[
  /* CASO 1 — folha */
  {steps:[
    {acao:'Identificar nó alvo: 3',inorder:'3  5  7  10  12  15  20',
     explain:'Árvore inicial. Queremos remover o nó 3, que é folha (sem filhos). Ele é filho esquerdo do nó 5.',
     draw(gE,gN){
       edge(gE,'n10','n5');edge(gE,'n10','n15');
       edge(gE,'n5','n3');edge(gE,'n5','n7');
       edge(gE,'n15','n12');edge(gE,'n15','n20');
       node(gN,'n10',10,C.normal);node(gN,'n5',5,C.normal);node(gN,'n15',15,C.normal);
       node(gN,'n3',3,C.normal);node(gN,'n7',7,C.normal);
       node(gN,'n12',12,C.normal);node(gN,'n20',20,C.normal);
     }},
    {acao:'nó 3 é folha → pai(5).esquerdo = null',inorder:'3  5  7  10  12  15  20',
     explain:'Nó 3 identificado (âmbar). É folha — esq=null, dir=null. Basta atualizar pai(5).esquerdo = null.',
     draw(gE,gN){
       edge(gE,'n10','n5');edge(gE,'n10','n15');
       edge(gE,'n5','n3',ED,true);edge(gE,'n5','n7');
       edge(gE,'n15','n12');edge(gE,'n15','n20');
       node(gN,'n10',10,C.normal);node(gN,'n5',5,C.vis);node(gN,'n15',15,C.normal);
       node(gN,'n3',3,C.cur);node(gN,'n7',7,C.normal);
       node(gN,'n12',12,C.normal);node(gN,'n20',20,C.normal);
     }},
    {acao:'Remoção concluída ✓',inorder:'5  7  10  12  15  20',
     explain:'Nó 3 removido. Pai(5) agora tem esquerdo=null. BST válida — in-order: [5, 7, 10, 12, 15, 20].',
     draw(gE,gN){
       edge(gE,'n10','n5');edge(gE,'n10','n15');
       edge(gE,'n5','n7');edge(gE,'n15','n12');edge(gE,'n15','n20');
       node(gN,'n10',10,C.normal);node(gN,'n5',5,C.succ);node(gN,'n15',15,C.normal);
       node(gN,'n7',7,C.normal);node(gN,'n12',12,C.normal);node(gN,'n20',20,C.normal);
     }},
  ]},
  /* CASO 2 — um filho */
  {steps:[
    {acao:'Identificar nó alvo: 15 (só filho esq = 12)',inorder:'3  5  7  10  12  15',
     explain:'Árvore onde 15 tem apenas filho esquerdo (12). Vamos remover 15.',
     draw(gE,gN){
       edge(gE,'n10','n5');edge(gE,'n10','n15');
       edge(gE,'n5','n3');edge(gE,'n5','n7');edge(gE,'n15','n12');
       node(gN,'n10',10,C.normal);node(gN,'n5',5,C.normal);node(gN,'n15',15,C.normal);
       node(gN,'n3',3,C.normal);node(gN,'n7',7,C.normal);node(gN,'n12',12,C.normal);
     }},
    {acao:'15 tem só filho esq → pai(10).dir = 12',inorder:'3  5  7  10  12  15',
     explain:'Nó 15 tem apenas filho esquerdo (12). O pai(10).direito passa a apontar diretamente para 12 — 15 é descartado.',
     draw(gE,gN){
       edge(gE,'n10','n5');
       edge(gE,'n10','n15',ED,true);
       edgeXY(gE,POS['n10'],POS['n12'],EN);
       edge(gE,'n5','n3');edge(gE,'n5','n7');
       node(gN,'n10',10,C.vis);node(gN,'n5',5,C.normal);node(gN,'n15',15,C.del);
       node(gN,'n3',3,C.normal);node(gN,'n7',7,C.normal);node(gN,'n12',12,C.succ);
     }},
    {acao:'Remoção concluída ✓',inorder:'3  5  7  10  12',
     explain:'Nó 15 removido. O filho 12 subiu para o lugar. BST válida — in-order: [3, 5, 7, 10, 12].',
     draw(gE,gN){
       const p2={cx:490,cy:Y1,r:R1};
       edgeXY(gE,POS['n10'],p2,EC);
       edge(gE,'n10','n5');edge(gE,'n5','n3');edge(gE,'n5','n7');
       node(gN,'n10',10,C.succ);node(gN,'n5',5,C.normal);
       node(gN,'n3',3,C.normal);node(gN,'n7',7,C.normal);
       nodeAt(gN,490,Y1,R1,12,C.succ);
     }},
  ]},
  /* CASO 3 — dois filhos */
  {steps:[
    {acao:'Identificar nó alvo: 10 (dois filhos)',inorder:'3  5  7  10  12  15  20',
     explain:'Removemos a raiz (10), que tem dois filhos. Estratégia: substituir pelo SUCESSOR IN-ORDER = menor da subárvore direita.',
     draw(gE,gN){
       edge(gE,'n10','n5');edge(gE,'n10','n15');
       edge(gE,'n5','n3');edge(gE,'n5','n7');
       edge(gE,'n15','n12');edge(gE,'n15','n20');
       node(gN,'n10',10,C.normal);node(gN,'n5',5,C.normal);node(gN,'n15',15,C.normal);
       node(gN,'n3',3,C.normal);node(gN,'n7',7,C.normal);
       node(gN,'n12',12,C.normal);node(gN,'n20',20,C.normal);
     }},
    {acao:'Sucessor in-order = mínimo da subárvore dir = 12',inorder:'3  5  7  10  12  15  20',
     explain:'Desce pela esquerda de {15,12,20}: o mais à esquerda é 12. Menor valor maior que 10 — o sucessor in-order.',
     draw(gE,gN){
       edge(gE,'n10','n5');edge(gE,'n10','n15');
       edge(gE,'n5','n3');edge(gE,'n5','n7');
       edge(gE,'n15','n12');edge(gE,'n15','n20');
       node(gN,'n10',10,C.del);node(gN,'n5',5,C.normal);node(gN,'n15',15,C.vis);
       node(gN,'n3',3,C.normal);node(gN,'n7',7,C.normal);
       node(gN,'n12',12,C.succ);node(gN,'n20',20,C.normal);
     }},
    {acao:'Copia dado do sucessor → raiz vira 12',inorder:'3  5  7  10  12  15  20',
     explain:'Copiamos o valor 12 para a raiz. Agora 12 aparece duas vezes. Próximo: remover o 12 original da subárvore direita (Caso 1 — folha).',
     draw(gE,gN){
       edge(gE,'n10','n5');edge(gE,'n10','n15');
       edge(gE,'n5','n3');edge(gE,'n5','n7');
       edge(gE,'n15','n12');edge(gE,'n15','n20');
       node(gN,'n10',12,C.cur);node(gN,'n5',5,C.normal);node(gN,'n15',15,C.vis);
       node(gN,'n3',3,C.normal);node(gN,'n7',7,C.normal);
       node(gN,'n12',12,C.del);node(gN,'n20',20,C.normal);
     }},
    {acao:'Remove sucessor (folha) → Remoção concluída ✓',inorder:'3  5  7  12  15  20',
     explain:'Sucessor 12 era folha → Caso 1. pai(15).esquerdo = null. BST válida — in-order: [3, 5, 7, 12, 15, 20].',
     draw(gE,gN){
       edge(gE,'n10','n5');edge(gE,'n10','n15');
       edge(gE,'n5','n3');edge(gE,'n5','n7');edge(gE,'n15','n20');
       node(gN,'n10',12,C.succ);node(gN,'n5',5,C.normal);node(gN,'n15',15,C.succ);
       node(gN,'n3',3,C.normal);node(gN,'n7',7,C.normal);node(gN,'n20',20,C.normal);
     }},
  ]},
];

let curCase=0,idx=-1;

function applyStep(i){
  const steps=CASES[curCase].steps;
  const gE=document.getElementById('g-edges');
  const gN=document.getElementById('g-nodes');
  gE.innerHTML='';gN.innerHTML='';
  const s=i<0?steps[0]:steps[i];
  s.draw(gE,gN);
  document.getElementById('explain').textContent=i<0?'Clique em Próximo para iniciar.':s.explain;
  document.getElementById('acao').textContent=i<0?'—':s.acao;
  document.getElementById('inorder').textContent=s.inorder;
  document.getElementById('counter').textContent=`Passo ${Math.max(0,i+1)} de ${steps.length}`;
}

function next(){const s=CASES[curCase].steps;if(idx<s.length-1){idx++;applyStep(idx);}}
function prev(){if(idx>-1){idx--;applyStep(idx);}}
function reset(){idx=-1;applyStep(-1);}
function setCase(c,el){
  curCase=c;idx=-1;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyStep(-1);
}
applyStep(-1);
</script>
</body>
</html>
