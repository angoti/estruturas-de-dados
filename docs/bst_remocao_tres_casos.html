
<style>
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--color-background-tertiary)}
.btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.panel{background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:8px;padding:10px 14px}
.label{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
</style>

<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
  <button class="btn active" onclick="setCase(0,this)">Caso 1 — Folha</button>
  <button class="btn" onclick="setCase(1,this)">Caso 2 — Um filho</button>
  <button class="btn" onclick="setCase(2,this)">Caso 3 — Dois filhos</button>
</div>

<svg id="svg-bst" width="100%" viewBox="0 0 680 240" style="display:block;margin-bottom:10px">
  <defs>
    <marker id="arm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <g id="g-edges"></g>
  <g id="g-nodes"></g>
</svg>

<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
  <button class="btn" onclick="prev()">← Anterior</button>
  <button class="btn" onclick="next()">Próximo →</button>
  <button class="btn" onclick="reset()">↺ Reiniciar</button>
  <span id="counter" style="font-size:12px;color:var(--color-text-secondary)"></span>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
  <div class="panel">
    <div class="label">Ação</div>
    <div style="font-family:var(--font-mono);font-size:12px;min-height:18px;color:var(--color-text-primary)" id="acao">—</div>
  </div>
  <div class="panel">
    <div class="label">In-order após remoção</div>
    <div style="font-family:var(--font-mono);font-size:12px;color:#1D9E75;min-height:18px" id="inorder">—</div>
  </div>
</div>

<div class="panel">
  <div class="label">Explicação</div>
  <div id="explain" style="font-size:13px;color:var(--color-text-primary);line-height:1.6;min-height:44px">Clique em Próximo para iniciar.</div>
</div>

<script>
const NS = 'http://www.w3.org/2000/svg';

/* ── cores hardcoded para funcionar fora do claude.ai ── */
const C = {
  normal:  {f:'#E1F5EE', s:'#1D9E75', t:'#085041'},
  cur:     {f:'#FAEEDA', s:'#BA7517', t:'#633806'},
  visited: {f:'#EEEDFE', s:'#534AB7', t:'#3C3489'},
  remove:  {f:'#FCEBEB', s:'#A32D2D', t:'#791F1F'},
  succ:    {f:'#EAF3DE', s:'#3B6D11', t:'#27500A'},
};
const EDGE_COLOR  = '#9ca3af';   /* cinza fixo para arestas normais */
const EDGE_DEL    = '#A32D2D';   /* vermelho para aresta que será removida */
const EDGE_NEW    = '#1D9E75';   /* verde para nova aresta */

function svgEl(tag, attrs){
  const e = document.createElementNS(NS, tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}

function edge(g, x1, y1, x2, y2, r1=24, r2=24, color=EDGE_COLOR, dashed=false){
  /* calcula pontos de parada na borda dos círculos */
  const dx=x2-x1, dy=y2-y1, dist=Math.sqrt(dx*dx+dy*dy);
  const sx=dx/dist, sy=dy/dist;
  const l=svgEl('line',{
    x1:x1+sx*r1, y1:y1+sy*r1,
    x2:x2-sx*r2, y2:y2-sy*r2,
    stroke:color,'stroke-width':'1.8'
  });
  if(dashed) l.setAttribute('stroke-dasharray','5 3');
  g.appendChild(l);
}

function node(g, cx, cy, val, color, r=24){
  const c=svgEl('circle',{cx,cy,r,fill:color.f,stroke:color.s,'stroke-width':'2'});
  const t=svgEl('text',{x:cx,y:cy,'text-anchor':'middle','dominant-baseline':'central',
    'font-size':r>=22?'14':'12','font-weight':'500',fill:color.t,
    'font-family':"'IBM Plex Mono',monospace"});
  t.textContent=val;
  g.appendChild(c); g.appendChild(t);
}

/* ── definições dos três casos ── */
const CASES = [

  /* CASO 1 — folha */
  { steps:[
    { acao:'Identificar nó alvo: 3',
      inorder:'3  5  7  10  12  15  20',
      explain:'Árvore inicial. Queremos remover o nó 3, que é folha (sem filhos). Localizado como filho esquerdo do nó 5.',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,480,126);
        edge(gE,200,126,130,206); edge(gE,200,126,270,206);
        edge(gE,480,126,410,206); edge(gE,480,126,550,206);
        node(gN,340,36,10,C.normal);
        node(gN,200,126,5,C.normal); node(gN,480,126,15,C.normal);
        node(gN,130,206,3,C.normal);   /* ainda normal no passo inicial */
        node(gN,270,206,7,C.normal); node(gN,410,206,12,C.normal); node(gN,550,206,20,C.normal);
      }},
    { acao:'nó 3 é folha → pai(5).esquerdo = null',
      inorder:'3  5  7  10  12  15  20',
      explain:'Nó 3 identificado como alvo (âmbar). É folha — sem filhos. Basta atualizar pai(5).esquerdo = null. Nenhum filho para reposicionar.',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,480,126);
        edge(gE,200,126,130,206,24,24,EDGE_DEL,true); /* aresta deletada */
        edge(gE,200,126,270,206);
        edge(gE,480,126,410,206); edge(gE,480,126,550,206);
        node(gN,340,36,10,C.normal);
        node(gN,200,126,5,C.visited); node(gN,480,126,15,C.normal);
        node(gN,130,206,3,C.cur);     /* alvo destacado */
        node(gN,270,206,7,C.normal); node(gN,410,206,12,C.normal); node(gN,550,206,20,C.normal);
      }},
    { acao:'Remoção concluída ✓',
      inorder:'5  7  10  12  15  20',
      explain:'Nó 3 removido. Pai(5) agora aponta para null à esquerda. BST válida — in-order: [5, 7, 10, 12, 15, 20].',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,480,126);
        edge(gE,200,126,270,206);
        edge(gE,480,126,410,206); edge(gE,480,126,550,206);
        node(gN,340,36,10,C.normal);
        node(gN,200,126,5,C.succ); node(gN,480,126,15,C.normal);
        node(gN,270,206,7,C.normal); node(gN,410,206,12,C.normal); node(gN,550,206,20,C.normal);
      }},
  ]},

  /* CASO 2 — um filho */
  { steps:[
    { acao:'Identificar nó alvo: 15',
      inorder:'3  5  7  10  12  15  20',
      explain:'Árvore com nó 15 tendo apenas filho esquerdo (12). Vamos remover 15.',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,480,126);
        edge(gE,200,126,130,206); edge(gE,200,126,270,206);
        edge(gE,480,126,410,206);
        node(gN,340,36,10,C.normal);
        node(gN,200,126,5,C.normal); node(gN,480,126,15,C.normal);
        node(gN,130,206,3,C.normal); node(gN,270,206,7,C.normal);
        node(gN,410,206,12,C.normal);
      }},
    { acao:'15 tem só filho esq → pai(10).dir = filho(12)',
      inorder:'3  5  7  10  12  15  20',
      explain:'Nó 15 tem apenas filho esquerdo (12). Substituímos 15 pelo seu único filho: pai(10).direito passa a apontar para 12.',
      draw(gE,gN){
        edge(gE,340,36,200,126);
        edge(gE,340,36,480,126,24,24,EDGE_DEL,true); /* velha aresta */
        edge(gE,340,36,410,206,24,24,EDGE_NEW);       /* nova aresta direta */
        edge(gE,200,126,130,206); edge(gE,200,126,270,206);
        node(gN,340,36,10,C.visited);
        node(gN,200,126,5,C.normal); node(gN,480,126,15,C.remove);
        node(gN,130,206,3,C.normal); node(gN,270,206,7,C.normal);
        node(gN,410,206,12,C.succ);
      }},
    { acao:'Remoção concluída ✓',
      inorder:'3  5  7  10  12',
      explain:'Nó 15 removido. O filho 12 sobe para o lugar. BST válida — in-order: [3, 5, 7, 10, 12].',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,420,136,24,22);
        edge(gE,200,126,130,206); edge(gE,200,126,270,206);
        node(gN,340,36,10,C.succ);
        node(gN,200,126,5,C.normal); node(gN,420,140,12,C.succ,22);
        node(gN,130,206,3,C.normal); node(gN,270,206,7,C.normal);
      }},
  ]},

  /* CASO 3 — dois filhos */
  { steps:[
    { acao:'Identificar nó alvo: 10 (dois filhos)',
      inorder:'3  5  7  10  12  15  20',
      explain:'Queremos remover a raiz (10), que tem dois filhos (5 e 15). Precisamos do SUCESSOR IN-ORDER = menor da subárvore direita.',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,480,126);
        edge(gE,200,126,130,206); edge(gE,200,126,270,206);
        edge(gE,480,126,410,206); edge(gE,480,126,550,206);
        node(gN,340,36,10,C.normal);
        node(gN,200,126,5,C.normal); node(gN,480,126,15,C.normal);
        node(gN,130,206,3,C.normal); node(gN,270,206,7,C.normal);
        node(gN,410,206,12,C.normal); node(gN,550,206,20,C.normal);
      }},
    { acao:'Localiza sucessor in-order = mínimo da subárvore dir = 12',
      inorder:'3  5  7  10  12  15  20',
      explain:'Desce pela esquerda da subárvore direita {15,12,20}: o mais à esquerda é 12. Ele é o menor valor maior que 10 — o sucessor.',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,480,126);
        edge(gE,200,126,130,206); edge(gE,200,126,270,206);
        edge(gE,480,126,410,206); edge(gE,480,126,550,206);
        node(gN,340,36,10,C.remove);
        node(gN,200,126,5,C.normal); node(gN,480,126,15,C.visited);
        node(gN,130,206,3,C.normal); node(gN,270,206,7,C.normal);
        node(gN,410,206,12,C.succ); node(gN,550,206,20,C.normal);
      }},
    { acao:'Copia dado do sucessor → nó vira 12',
      inorder:'3  5  7  10  12  15  20',
      explain:'Copiamos o valor 12 para o nó raiz (onde estava 10). Agora 12 aparece duas vezes — o próximo passo remove o 12 original da subárvore direita.',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,480,126);
        edge(gE,200,126,130,206); edge(gE,200,126,270,206);
        edge(gE,480,126,410,206); edge(gE,480,126,550,206);
        node(gN,340,36,12,C.cur);
        node(gN,200,126,5,C.normal); node(gN,480,126,15,C.visited);
        node(gN,130,206,3,C.normal); node(gN,270,206,7,C.normal);
        node(gN,410,206,12,C.remove); node(gN,550,206,20,C.normal);
      }},
    { acao:'Remove sucessor (folha) → Remoção concluída ✓',
      inorder:'3  5  7  12  15  20',
      explain:'O sucessor 12 é folha — aplica Caso 1. pai(15).esquerdo = null. BST válida — in-order: [3,5,7,12,15,20].',
      draw(gE,gN){
        edge(gE,340,36,200,126); edge(gE,340,36,480,126);
        edge(gE,200,126,130,206); edge(gE,200,126,270,206);
        edge(gE,480,126,550,206);
        node(gN,340,36,12,C.succ);
        node(gN,200,126,5,C.normal); node(gN,480,126,15,C.succ);
        node(gN,130,206,3,C.normal); node(gN,270,206,7,C.normal);
        node(gN,550,206,20,C.normal);
      }},
  ]},
];

let curCase=0, idx=-1;

function applyStep(i){
  const steps=CASES[curCase].steps;
  const gE=document.getElementById('g-edges');
  const gN=document.getElementById('g-nodes');
  gE.innerHTML=''; gN.innerHTML='';

  if(i<0){
    /* estado inicial: desenha primeiro frame sem destacar nenhum alvo */
    const s0=steps[0];
    /* chama draw mas sobrescreve: todos os nós em C.normal */
    s0.draw(gE,gN);
    document.getElementById('explain').textContent='Clique em Próximo para iniciar.';
    document.getElementById('acao').textContent='—';
    document.getElementById('inorder').textContent=s0.inorder;
    document.getElementById('counter').textContent=`Passo 0 de ${steps.length}`;
    return;
  }

  const s=steps[i];
  s.draw(gE,gN);
  document.getElementById('explain').textContent=s.explain;
  document.getElementById('acao').textContent=s.acao;
  document.getElementById('inorder').textContent=s.inorder;
  document.getElementById('counter').textContent=`Passo ${i+1} de ${steps.length}`;
}

function next(){const s=CASES[curCase].steps;if(idx<s.length-1){idx++;applyStep(idx);}}
function prev(){if(idx>-1){idx--;applyStep(idx);}}
function reset(){idx=-1;applyStep(-1);}
function setCase(c,el){
  curCase=c;idx=-1;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyStep(-1);
}
applyStep(-1);
</script>
