
<style>
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.ctrl input{width:72px;font-size:14px}
.ctrl button{font-size:13px}
.log{font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary);min-height:18px;margin-bottom:8px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--color-text-secondary);margin-top:8px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;border:1.5px solid;vertical-align:middle;margin-right:3px}
.info-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-family:var(--font-mono);font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary)}
</style>

<h2 class="sr-only">BST interativa — insira e busque valores para ver a propriedade de ordenação</h2>

<div class="ctrl">
  <input type="number" id="val" placeholder="valor" min="1" max="99" value="50">
  <button onclick="doInsert()">Inserir</button>
  <button onclick="doSearch()">Buscar</button>
  <button onclick="doReset()">Limpar</button>
</div>

<div class="info-row">
  <span class="chip" id="chip-n">nós: 0</span>
  <span class="chip" id="chip-h">altura: −1</span>
  <span class="chip" id="chip-cmp">comparações: —</span>
</div>

<div class="log" id="log">Insira um valor para começar.</div>

<svg id="bst-svg" width="100%" viewBox="0 0 680 360" style="display:block;margin-bottom:4px">
  <g id="edges"></g>
  <g id="nodes"></g>
  <text id="empty-msg" x="340" y="180" text-anchor="middle" font-size="13"
        fill="var(--color-text-tertiary)" font-family="var(--font-sans)">
    Árvore vazia — insira valores acima
  </text>
</svg>

<div class="legend">
  <span><span class="dot" style="background:#E1F5EE;border-color:#1D9E75"></span>nó normal</span>
  <span><span class="dot" style="background:#FAEEDA;border-color:#BA7517"></span>caminho de busca/inserção</span>
  <span><span class="dot" style="background:#EAF3DE;border-color:#3B6D11"></span>encontrado</span>
  <span><span class="dot" style="background:#FCEBEB;border-color:#A32D2D"></span>não encontrado</span>
</div>

<script>
const R = 20;
const SVG_W = 680;
const LEVEL_H = 72;
const PAD = 30;

let root = null;
let animTimer = null;

function mkNode(v){ return {v, left:null, right:null, _x:0, _y:0}; }

function insert(r, v){
  if(!r) return mkNode(v);
  if(v < r.v)      r.left  = insert(r.left,  v);
  else if(v > r.v) r.right = insert(r.right, v);
  return r;
}

function height(r){ return r ? 1 + Math.max(height(r.left), height(r.right)) : -1; }
function count(r) { return r ? 1 + count(r.left) + count(r.right) : 0; }

/* ── Layout: calcula posições x,y para cada nó ──────────────────────
   Estratégia: in-order traversal com contador global.
   Garante que nenhum nó se sobreponha, independente do balanço.     */
function computeLayout(r, depth, counter){
  if(!r) return;
  computeLayout(r.left, depth+1, counter);
  r._x = PAD + counter.i * ((SVG_W - 2*PAD) / (count(root) - 1 || 1));
  r._y = 36 + depth * LEVEL_H;
  counter.i++;
  computeLayout(r.right, depth+1, counter);
}

function layout(){
  if(!root) return;
  const n = count(root);
  if(n === 1){
    root._x = SVG_W / 2;
    root._y = 36;
    return;
  }
  computeLayout(root, 0, {i:0});
}

/* ── SVG helpers ─────────────────────────────────────────────────── */
function svgEl(tag, attrs){
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

/* ── Render ──────────────────────────────────────────────────────── */
function render(highlight=[], found=null, notFound=false){
  const edgesG = document.getElementById('edges');
  const nodesG = document.getElementById('nodes');
  edgesG.innerHTML = '';
  nodesG.innerHTML = '';
  document.getElementById('empty-msg').style.display = root ? 'none' : '';
  if(!root) return;

  layout();   /* sempre calcular antes de desenhar */

  /* arestas primeiro (ficam por baixo) */
  (function drawEdges(r){
    if(!r) return;
    if(r.left){
      edgesG.appendChild(svgEl('line',{
        x1:r._x, y1:r._y + R, x2:r.left._x, y2:r.left._y - R,
        stroke:'var(--color-border-secondary)', 'stroke-width':'1.2'
      }));
      drawEdges(r.left);
    }
    if(r.right){
      edgesG.appendChild(svgEl('line',{
        x1:r._x, y1:r._y + R, x2:r.right._x, y2:r.right._y - R,
        stroke:'var(--color-border-secondary)', 'stroke-width':'1.2'
      }));
      drawEdges(r.right);
    }
  })(root);

  /* nós por cima */
  const hlSet = new Set(highlight);
  (function drawNodes(r){
    if(!r) return;
    const isFound = found === r.v;
    const isNF    = notFound && hlSet.has(r.v) && r.v === highlight[highlight.length-1];
    const isHL    = hlSet.has(r.v);

    let fill='#E1F5EE', stroke='#1D9E75', tc='#085041';
    if(isFound)     { fill='#EAF3DE'; stroke='#3B6D11'; tc='#27500A'; }
    else if(isNF)   { fill='#FCEBEB'; stroke='#A32D2D'; tc='#791F1F'; }
    else if(isHL)   { fill='#FAEEDA'; stroke='#BA7517'; tc='#633806'; }

    const g = svgEl('g',{});
    g.appendChild(svgEl('circle',{cx:r._x, cy:r._y, r:R, fill, stroke, 'stroke-width':'1.5'}));
    const t = svgEl('text',{
      x:r._x, y:r._y, 'text-anchor':'middle', 'dominant-baseline':'central',
      'font-size':'12', 'font-weight':'500', fill:tc,
      'font-family':'var(--font-mono)'
    });
    t.textContent = r.v;
    g.appendChild(t);
    nodesG.appendChild(g);
    drawNodes(r.left);
    drawNodes(r.right);
  })(root);

  document.getElementById('chip-n').textContent = `nós: ${count(root)}`;
  document.getElementById('chip-h').textContent = `altura: ${height(root)}`;
}

/* ── Busca com caminho ───────────────────────────────────────────── */
function searchPath(v){
  const path=[]; let cur=root;
  while(cur){
    path.push(cur.v);
    if(v===cur.v) return {path, found:true};
    cur = v < cur.v ? cur.left : cur.right;
  }
  return {path, found:false};
}

function insertPath(v){
  const path=[]; let cur=root;
  while(cur){ path.push(cur.v); cur = v<cur.v ? cur.left : cur.right; }
  return path;
}

/* ── Animação passo a passo ─────────────────────────────────────── */
function animate(path, targetV, mode){
  if(animTimer) clearTimeout(animTimer);
  let i=0;
  function step(){
    const hl = path.slice(0, i+1);
    const isLast = i===path.length-1;
    if(mode==='search'){
      const fd = isLast && path[i]===targetV ? targetV : null;
      const nf = isLast && path[i]!==targetV;
      render(hl, fd, nf);
      if(isLast){
        const cmp = path.length;
        document.getElementById('chip-cmp').textContent = `comparações: ${cmp}`;
        document.getElementById('log').textContent = fd
          ? `Encontrado: ${targetV} em ${cmp} comparação(ões)`
          : `${targetV} não está na árvore — ${cmp} comparação(ões)`;
        return;
      }
    } else {
      render(hl, isLast ? targetV : null, false);
      if(isLast) return;
    }
    i++;
    animTimer = setTimeout(step, 380);
  }
  step();
}

/* ── Ações do usuário ───────────────────────────────────────────── */
function doInsert(){
  const v = parseInt(document.getElementById('val').value);
  if(isNaN(v)||v<1||v>99){ log('Use um valor entre 1 e 99.'); return; }
  const path = insertPath(v);
  root = insert(root, v);
  const fullPath = path.concat([v]);
  animate(fullPath, v, 'insert');
  document.getElementById('chip-cmp').textContent = `comparações: ${fullPath.length}`;
  log(`Inserido: ${v}  (caminho: ${fullPath.join(' → ')})`);
  document.getElementById('val').value='';
}

function doSearch(){
  const v = parseInt(document.getElementById('val').value);
  if(isNaN(v)||v<1||v>99){ log('Use um valor entre 1 e 99.'); return; }
  if(!root){ log('Árvore vazia.'); return; }
  const {path, found} = searchPath(v);
  animate(path, v, 'search');
}

function doReset(){
  if(animTimer) clearTimeout(animTimer);
  root=null; render();
  log('Árvore limpa.');
  document.getElementById('chip-n').textContent='nós: 0';
  document.getElementById('chip-h').textContent='altura: −1';
  document.getElementById('chip-cmp').textContent='comparações: —';
}

function log(msg){ document.getElementById('log').textContent=msg; }

/* ── Árvore de exemplo ──────────────────────────────────────────── */
[40,20,60,10,30,50,70].forEach(v=>{ root=insert(root,v); });
render();
log('Árvore de exemplo carregada. Insira ou busque um valor.');
document.getElementById('chip-n').textContent=`nós: ${count(root)}`;
document.getElementById('chip-h').textContent=`altura: ${height(root)}`;
</script>
